<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naruto Shinobi Celebration</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        /* Heart Animation Styles */
        .heart-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .heart {
            fill: lavender;
            width: 50px;
            animation: pulse 1s ease infinite;
        }

        #heart {
            position: relative;
            width: 100px;
            height: 90px;
            text-align: center;
            font-size: 16px;
            color: lavender;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        #heart::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            opacity: 0.5;
            z-index: -1;
            box-shadow: 0 0 10px 5px purple;
        }
    </style>
</head>
<body>

    <!-- Heart Animation -->
    <div class="heart-container">
        <div id="heart">
            <svg class="heart" viewBox="0 0 32 29.6">
                <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
            </svg>
            <p>Happy Birthday!</p>
        </div>
    </div>

    <!-- Naruto Calculus Game Content -->
    <h1>Naruto Calculus Shinobi Dance Chronicles</h1>
    <div id="game-container">
        <p>Level 1: Konoha Gate Jutsu</p>
        <p>Solve: d/dx(x²) = ?</p>
        <input type="text" id="answerInput" placeholder="Enter answer...">
        <button onclick="checkAnswer()">CAST FORMULA!</button>
        <p id="feedback"></p>
    </div>

    <script>
        function checkAnswer() {
            const answer = document.getElementById('answerInput').value;
            const feedback = document.getElementById('feedback');
            if (answer === "2x") {
                feedback.innerText = "Success! The gates are open!";
                // Dito mo ilalagay ang logic para sa dance animation
            } else {
                feedback.innerText = "Try again!";
            }
        }
    </script>
</body>
</html>
