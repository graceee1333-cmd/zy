<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Ratio Calculator</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; font-weight: bold; }
        input { width: 100%; padding: 0.5rem; margin-top: 0.2rem; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 0.7rem 1rem; border-radius: 4px; cursor: pointer; }
        #results { margin-top: 2rem; padding: 1rem; background: #f4f4f4; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Financial Ratio Calculator</h2>
    
    <div class="input-group">
        <label>Current Assets ($)</label>
        <input type="number" id="assets" placeholder="e.g. 50000">
    </div>
    <div class="input-group">
        <label>Current Liabilities ($)</label>
        <input type="number" id="liabilities" placeholder="e.g. 25000">
    </div>
    
    <button onclick="calculate()">Calculate Current Ratio</button>

    <div id="results">
        <strong>Result:</strong> Please enter values and calculate.
    </div>

    <script>
        function calculate() {
            const assets = parseFloat(document.getElementById('assets').value);
            const liabilities = parseFloat(document.getElementById('liabilities').value);
            const resultDiv = document.getElementById('results');

            if (isNaN(assets) || isNaN(liabilities) || liabilities === 0) {
                resultDiv.innerHTML = "<strong>Error:</strong> Please enter valid numbers. Liabilities cannot be zero.";
                return;
            }

            const ratio = (assets / liabilities).toFixed(2);
            resultDiv.innerHTML = `<strong>Current Ratio:</strong> ${ratio}<br>
                                  <small>A ratio > 1 indicates the company has more assets than short-term liabilities.</small>`;
        }
    </script>
</body>
</html>
