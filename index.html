<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background-color: #0d0d1a; color: white; font-family: sans-serif; overflow: hidden; }
        /* Loading Screen */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d0d1a; display: flex; justify-content: center; align-items: center; z-index: 100; }
        /* Main Content */
        #content { display: none; text-align: center; }
        .naruto-chibi { width: 150px; }
    </style>
</head>
<body>
    <div id="loader"><h1>Naglo-load... (2 mins)</h1></div>
    
    <div id="content">
        <h1>Happy Birthday, Ken!</h1>
        <p>Believe it! 🍥</p>
        <img src="https://i.pinimg.com/originals/e8/6e/c3/e86ec32a2469a4738555e09873a4e9a5.png" class="naruto-chibi" alt="Cute Naruto">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Loading timer (2 minutes = 120,000ms)
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            initHeartAnimation();
        }, 120000);

        function initHeartAnimation() {
            // Heart Animation Logic gaya sa 1000002869.mp4
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Glitter/Particles logic
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 5000; i++) {
                vertices.push((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const material = new THREE.PointsMaterial({ color: 0x8884d8, size: 2 });
            const glitter = new THREE.Points(geometry, material);
            scene.add(glitter);

            camera.position.z = 500;

            function animate() {
                requestAnimationFrame(animate);
                glitter.rotation.y += 0.002;
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
