<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naruto Calculus Shinobi Dance Chronicles</title>
    <!-- Three.js Library para sa Heart Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.7.1/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #0f0c1b; color: white; text-align: center; font-family: sans-serif; overflow: hidden; }
        
        /* Container para sa Heart at Laro */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #game-ui { position: relative; z-index: 2; pointer-events: auto; padding-top: 50px; }

        .jutsu-box { background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; display: inline-block; border: 2px solid #a55eea; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #a55eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="game-ui">
        <h1>Naruto Calculus Shinobi Dance Chronicles</h1>
        <div class="jutsu-box">
            <p id="mathQuestion">d/dx (x²) = ?</p>
            <input type="text" id="answerInput" placeholder="Enter answer...">
            <button onclick="checkAnswer()">CAST FORMULA!</button>
            <p id="feedback"></p>
        </div>
    </div>

    <script>
        // --- 3D Heart Animation Code mula sa 1000002870.png ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Heart shape path
        const shape = new THREE.Shape();
        shape.moveTo(0, 0);
        shape.bezierCurveTo(0, 5, -10, 5, -10, 0);
        shape.bezierCurveTo(-10, -5, 0, -10, 0, -15);
        shape.bezierCurveTo(0, -10, 10, -5, 10, 0);
        shape.bezierCurveTo(10, 5, 0, 5, 0, 0);

        const path = new THREE.Path(shape.getPoints());
        const points = path.getSpacedPoints(100);
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.PointsMaterial({ color: 0xe0b0ff, size: 0.5 });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        camera.position.z = 30;
        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.z += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // --- Game Logic ---
        function checkAnswer() {
            const ans = document.getElementById('answerInput').value.trim();
            if(ans === "2x") {
                document.getElementById('feedback').innerText = "Success! The gates are open!";
                // Dito mo ilalagay ang transition para sa susunod na level gaya ng dating logic
            }
        }
    </script>
</body>
</html>
