<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #E6E6FA; /* Lavender Purple */
            color: #4B0082; /* Deep Purple text */
            text-align: center;
            font-family: 'Arial', sans-serif;
            padding: 50px;
        }
        .container {
            border: 5px solid #FF8C00; /* Konoha Orange */
            border-radius: 20px;
            padding: 30px;
            background-color: #ffffff;
            max-width: 600px;
            margin: auto;
        }
        h1 { color: #FF4500; }
        .ninja-button {
            background-color: #4B0082;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Happy Birthday, Ken!</h1>
    <p>Believe it! 🍥</p>
    <p>Wishing you a year full of chakra and adventure.</p>
    <button class="ninja-button" onclick="alert('Dattebayo! 🍜')">Click for Surprise</button>
</div>

</body>
</html>
