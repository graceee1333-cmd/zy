<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.heart{
    position:relative;
    width:120px;
    height:120px;
    background:red;
    transform:rotate(-45deg);
    animation:beat 1s infinite;
}

.heart:before,
.heart:after{
    content:"";
    position:absolute;
    width:120px;
    height:120px;
    background:red;
    border-radius:50%;
}

.heart:before{
    top:-60px;
    left:0;
}

.heart:after{
    left:60px;
    top:0;
}

.text{
    position:absolute;
    color:white;
    font-size:40px;
    font-family:Arial;
    text-shadow:0 0 20px pink;
}

@keyframes beat{
    0%,100%{
        transform:rotate(-45deg) scale(1);
    }
    50%{
        transform:rotate(-45deg) scale(1.2);
    }
}
</style>
</head>

<body>

<div class="heart"></div>
<div class="text">I LOVE YOU ❤️</div>

</body>
</html>
