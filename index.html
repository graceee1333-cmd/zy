<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Arial', sans-serif; background: #2c3e50; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Disenyo ng Scroll */
        #scroll-ui { 
            display: none; 
            background: #f4e4bc; /* Kulay ng lumang papel */
            padding: 40px; 
            width: 350px; 
            text-align: center;
            border-left: 20px solid #8b4513; /* Wood ends ng scroll */
            border-right: 20px solid #8b4513;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
            border-radius: 5px;
            position: relative;
        }

        h2 { border-bottom: 2px solid #8b4513; padding-bottom: 10px; font-family: 'Georgia', serif; }
        
        button { padding: 10px 20px; cursor: pointer; background: #c0392b; color: white; border: none; font-weight: bold; border-radius: 5px; }
        input { padding: 10px; width: 60px; font-size: 16px; border: 2px solid #8b4513; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="target-area">
        <button onclick="throwJutsu()">Hagis Rasen-Shuriken!</button>
    </div>

    <div id="scroll-ui">
        <h2>📜 Ninjutsu Scroll</h2>
        <p><strong>Problem:</strong><br> Ano ang derivative ng $f(x) = 5x^2$ sa $x = 1$?</p>
        <input type="number" id="answer" placeholder="Sagot">
        <br><br>
        <button onclick="checkAnswer()">I-release ang Jutsu!</button>
    </div>
</div>

<script>
    function throwJutsu() {
        document.getElementById('target-area').style.display = 'none';
        document.getElementById('scroll-ui').style.display = 'block';
    }

    function checkAnswer() {
        let ans = document.getElementById('answer').value;
        if (parseInt(ans) === 10) {
            alert("SUCCESS! Natutunan mo ang Calculus Jutsu!");
            location.reload();
        } else {
            alert("Mali ang computation! Subukan ulit!");
        }
    }
</script>

</body>
</html>
